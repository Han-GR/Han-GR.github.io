# 菜单配置：main 为侧边栏主菜单，social 为头像下方社交链接
# Configure main menu and social menu
# 侧边栏主菜单项：支持多个 [[main]] 块

# 头像下方社交链接：支持多个 [[social]] 块
[[social]]
    identifier = "github"       # GitHub 链接
    name       = "GitHub"
    url        = "https://github.com/CaiJimmy/hugo-theme-stack"

    [social.params]
        icon = "brand-github"   # 使用品牌图标：assets/icons/brand-github.svg

[[social]]
    identifier = "email"        # 邮箱链接，mailto: 协议
    name       = "邮件"
    url        = "mailto:han_gr@foxmail.com"

    [social.params]
        icon = "mail"           # 对应 assets/icons/mail.svg
